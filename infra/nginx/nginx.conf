# SisGeS - Nginx reverse proxy (uso com docker-compose).
#
# Pensado para ser montado em /etc/nginx/conf.d/default.conf na imagem
# nginx:alpine (que ja fornece os blocos "events"/"http" no nginx.conf
# principal da imagem). Para uso fora de container/Windows local, ver o
# arquivo standalone equivalente em ops/nginx/sisges.conf e
# docs/NGINX_HARDENING_SISGES.md.
#
# Topologia no compose:
# - Servico "app" (FastAPI/uvicorn): app:8000
# - Entrada via Nginx:               http://localhost (porta 80 do host)
#
# Importante:
# - A rota real de login no FastAPI e' /auth/login.
# - Este arquivo e' minimo (proxy + headers basicos). Para rate limiting,
#   CSP completa e demais diretivas defensivas, ver ops/nginx/sisges.conf,
#   que documenta o hardening adotado localmente e pode ser portado para
#   este arquivo quando o frontend for servido atras do mesmo proxy.

limit_req_zone $binary_remote_addr zone=sisges_login_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=sisges_api_limit:20m rate=20r/s;

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;
    client_body_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /auth/login {
        limit_req zone=sisges_login_limit burst=10 nodelay;

        proxy_pass http://app:8000/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header Connection "";
    }

    location /health {
        access_log off;
        proxy_pass http://app:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $http_x_request_id;
    }

    location / {
        limit_req zone=sisges_api_limit burst=40 nodelay;

        proxy_pass http://app:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header Connection "";
    }
}
