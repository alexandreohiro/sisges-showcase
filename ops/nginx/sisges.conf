# SISGES - Nginx reverse proxy defensivo local/pre-producao
#
# Topologia esperada:
# - Frontend Next.js: http://127.0.0.1:3000
# - Backend FastAPI:  http://127.0.0.1:8000
# - API publica via proxy: http://localhost/api/*
#
# Importante:
# - A rota real de login no FastAPI e /auth/login.
# - O bloco /api/ remove o prefixo /api antes de encaminhar ao backend.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=sisges_login_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=sisges_api_limit:20m rate=20r/s;

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;
        client_body_timeout 30s;
        keepalive_timeout 65s;
        send_timeout 30s;

        server_tokens off;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob:; font-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000;" always;

        location = /api/auth/login {
            limit_req zone=sisges_login_limit burst=10 nodelay;

            proxy_pass http://127.0.0.1:8000/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=sisges_api_limit burst=40 nodelay;

            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
